<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍪 yam yam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 16px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    #send-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 1px;
    }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 14px;
      font-size: 13px;
      min-height: 36px;
      text-align: center;
      line-height: 1.5;
      color: #aaa;
      white-space: pre-line;
    }
    #status.ok  { color: #2ecc71; }
    #status.err { color: #e74c3c; }
    #status.warn { color: #f39c12; }

    .meta {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>🍪 yam yam</h1>

  <button id="send-btn">🔑 쿠키 복사</button>

  <div id="status"></div>

  <div class="meta" id="meta"></div>

  <script src="popup.js"></script>
</body>
</html>
