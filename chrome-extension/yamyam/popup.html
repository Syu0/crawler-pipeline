<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍪 yam yam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 16px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    #send-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 1px;
    }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 14px;
      font-size: 13px;
      min-height: 36px;
      text-align: center;
      line-height: 1.5;
      color: #aaa;
    }
    #status.ok  { color: #2ecc71; }
    #status.err { color: #e74c3c; }
    #status.warn { color: #f39c12; }

    .meta {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a4a;
      margin: 14px 0;
    }

    label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #0f0f23;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #ccc;
      font-size: 12px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #e94560; }

    #save-url-btn {
      margin-top: 6px;
      padding: 6px 12px;
      background: #2a2a4a;
      border: none;
      border-radius: 6px;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }
    #save-url-btn:hover { background: #3a3a5a; color: #fff; }

    #receiver-hint {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
      text-align: left;
    }
    #receiver-hint code {
      font-family: 'Courier New', Courier, monospace;
      background: #2a2a2a;
      color: #ccc;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>🍪 yam yam</h1>

  <button id="send-btn">🍪 yam yam</button>

  <div id="status"></div>
  <div id="receiver-hint">
    리시버가 꺼져 있어요. 터미널에서 아래 명령어로 실행하세요:<br>
    <code>npm run backend:start</code>
  </div>

  <div class="meta" id="meta"></div>

  <hr class="divider">

  <label for="server-url">서버 URL</label>
  <input type="text" id="server-url" placeholder="http://localhost:4000" />
  <button id="save-url-btn">저장</button>

  <script src="popup.js"></script>
</body>
</html>
